word_database:
  min_frequency: 1
  min_length: 3
  max_length: 5
  exclude_special_chars: True

embeddings:
  model: text-embedding-3-large # active embedding model, switch to text-embedding-3-small for lighter cache
  data_dir: data/02_intermediary/word_database
  models: # cache files + dimension per model, so caches for different models coexist on disk
    text-embedding-3-small:
      embeddings_file: word_embeddings_fp16.npy
      index_file: word_index.json
      dimension: 1536
    text-embedding-3-large:
      embeddings_file: word_embeddings_large_fp16.npy
      index_file: word_index_large.json
      dimension: 3072

crossword_generator:
  node_budget: 20000 # max word placements per backtracking attempt before giving up
  restart_count: 5 # attempts, each with a different theme placement / random word order

theme_fill:
  boost: 4.0 # strength of the theme bias; weight = frequency * (1 + boost * themeness)
  sim_low: 0.30 # cosine baseline for unrelated words (calibrated for text-embedding-3-large)
  sim_high: 0.45 # cosine for clearly related words; sim in [low, high] maps to themeness 0..1
  visible_threshold: 0.6 # normalized themeness at/above which a filled word counts as on-theme

theme_anchors:
  candidate_pool: 60 # top-N cosine words handed to the LLM to vet
  vetted_pool: 30 # max validated on-theme words the LLM may return (the pool to draw from)
  max_anchors: 3 # how many anchors are actually placed in one grid (fill falls back to fewer)
  anchor_attempts: 25 # random anchor combinations tried per anchor count; higher = more variety
  min_chars: 3 # anchors span all usable slot lengths, not just 5
  max_chars: 5
  allow_llm_words: True # if True, the LLM may also suggest on-theme words not in the DB (guarded, see below)
  min_zipf: 2.5 # own-words only: min wordfreq Zipf for a non-DB word to count as real + common